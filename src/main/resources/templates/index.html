<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #333333;
        }

        .container {
            background-color: #ffffff;
            padding: 20px 40px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        label {
            display: block;
            text-align: left;
            margin-bottom: 8px;
            font-size: 11px;
            color: #525659;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #000;
            border: none;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #555555;
        }

        .link {
            font-size: 12px;
            padding-top: 10px;
        }

    </style>
</head>
<body>
<div class="container">
    <h2>Entrar</h2>
    <label style="text-align: center">Entre para continuar</label>
    <form method="POST">
        <label class="labelLogin" for="email">E-MAIL:</label>
        <input type="email" id="email" name="email" placeholder="email@email.com" required>

        <label class="labelLogin" for="password">SENHA:</label>
        <input type="password" id="password" name="password" placeholder="******" required>

        <button type="submit">Entrar</button>

        <br>
        <a class="link">Esqueceu sua senha?</a>
        <br>
        <a class="link" href="/cadastro">Cadastrar</a>
    </form>
</div>
</body>
</html>
